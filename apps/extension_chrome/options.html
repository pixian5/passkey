<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pass Extension 设置</title>
    <link rel="stylesheet" href="./options.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <details id="deviceSettingsDetails">
          <summary>设备设置</summary>
          <div class="row">
            <label for="deviceName">设备名称</label>
            <input id="deviceName" type="text" placeholder="例如 ChromeMac" />
            <button id="saveDeviceName">保存</button>
          </div>
          <div class="row">
            <label>同步源</label>
            <div id="syncSourceChecks" class="sync-source-checks">
              <label><input id="syncEnableWebdav" type="checkbox" /> WebDAV</label>
              <label><input id="syncEnableServer" type="checkbox" /> 自建服务器</label>
            </div>
            <button id="saveSyncSettings">保存</button>
          </div>
          <div class="row sync-actions-row">
            <label>同步操作</label>
            <div class="sync-action-buttons">
              <button id="syncMergeBtn" type="button">合并已启用源</button>
              <button id="syncRemoteOverwriteLocalBtn" type="button">云端覆盖本地</button>
              <button id="syncLocalOverwriteRemoteBtn" type="button">本地覆盖云端</button>
            </div>
            <span></span>
          </div>
          <p class="hint">
            合并：保留双方变更；云端覆盖本地：用所有已启用远端的汇总结果替换本机；本地覆盖云端：直接把本机数据推到所有已启用远端。
          </p>
          <div id="syncWebdavFields">
            <div class="row">
              <label for="syncWebdavBaseUrl">WebDAV</label>
              <input id="syncWebdavBaseUrl" type="text" placeholder="https://dav.example.com/remote.php/dav/files/<user>/" />
              <span></span>
            </div>
            <div class="row">
              <label for="syncWebdavPath">远端路径</label>
              <input id="syncWebdavPath" type="text" placeholder="pass-sync-bundle-v2.json" />
              <span></span>
            </div>
            <div class="row">
              <label for="syncWebdavUsername">用户名</label>
              <input id="syncWebdavUsername" type="text" placeholder="可选" />
              <span></span>
            </div>
            <div class="row">
              <label for="syncWebdavPassword">密码</label>
              <input id="syncWebdavPassword" type="password" placeholder="可选" />
              <span></span>
            </div>
          </div>
          <div id="syncServerFields" class="hidden">
            <div class="row">
              <label for="syncServerBaseUrl">服务地址</label>
              <input id="syncServerBaseUrl" type="text" placeholder="http://127.0.0.1:53333/" />
              <span></span>
            </div>
            <div class="row">
              <label for="syncServerToken">访问令牌</label>
              <input id="syncServerToken" type="password" placeholder="可选 Bearer Token" />
              <span></span>
            </div>
          </div>
          <div class="lock-settings">
            <h4>解锁设置</h4>
            <div class="row lock-row">
              <label for="lockEnabled">主密码锁</label>
              <label class="inline-check">
                <input id="lockEnabled" type="checkbox" />
                <span>启用</span>
              </label>
              <button id="saveLockSettings">保存</button>
            </div>
            <p id="lockCredentialHint" class="lock-hint"></p>
            <div id="lockAdvancedFields" class="lock-advanced hidden">
              <div class="row lock-policy-row">
                <label>自动锁策略</label>
                <div class="lock-policy-radios">
                  <label class="lock-policy-option">
                    <input id="lockPolicyOnce" type="radio" name="lockPolicy" value="onceUntilQuit" checked />
                    <span>退出前不锁定</span>
                  </label>
                  <label class="lock-policy-option">
                    <input id="lockPolicyIdle" type="radio" name="lockPolicy" value="idleTimeout" />
                    <span>几分钟无操作后锁定</span>
                  </label>
                  <label class="lock-policy-option">
                    <input id="lockPolicyBackground" type="radio" name="lockPolicy" value="onBackground" />
                    <span>切到后台锁定</span>
                  </label>
                </div>
                <span></span>
              </div>
              <div id="lockIdleMinutesRow" class="row">
                <label for="lockIdleMinutes">空闲分钟</label>
                <input id="lockIdleMinutes" type="number" min="1" max="60" step="1" />
                <span></span>
              </div>
              <div class="row">
                <label for="lockMasterPassword">主密码</label>
                <input
                  id="lockMasterPassword"
                  type="password"
                  autocomplete="new-password"
                  placeholder="设置或修改主密码"
                />
                <span></span>
              </div>
              <div class="row">
                <label for="lockMasterPasswordConfirm">确认密码</label>
                <input
                  id="lockMasterPasswordConfirm"
                  type="password"
                  autocomplete="new-password"
                  placeholder="设置或修改主密码时必填"
                />
                <span></span>
              </div>
            </div>
          </div>
          <p id="deviceStatus" class="status"></p>
        </details>
      </section>

      <section class="card">
        <div class="accounts-layout">
          <aside class="accounts-sidebar">
            <button id="accountsTabAll" type="button" class="account-view-tab is-active">
              全部 <span id="allAccountsCount">(0)</span>
            </button>
            <button id="accountsTabPasskey" type="button" class="account-view-tab">
              通行密钥 <span id="passkeyAccountsCount">(0)</span>
            </button>
            <button id="accountsTabTotp" type="button" class="account-view-tab">
              验证码 <span id="totpAccountsCount">(0)</span>
            </button>
            <button id="accountsTabRecycle" type="button" class="account-view-tab">
              回收站 <span id="recycleAccountsCount">(0)</span>
            </button>
            <div class="sidebar-folder-head-row">
              <div class="sidebar-folder-head">文件夹</div>
              <button id="createFolderBtn" type="button" class="sidebar-folder-create-btn">新建</button>
            </div>
            <div id="accountsFolderList" class="accounts-folder-list"></div>
          </aside>
          <div class="accounts-main">
            <div class="section-head">
              <div class="actions head-actions">
                <div id="allAccountsSearchWrap" class="search-filter-wrap">
                  <button id="allAccountsSearchFieldsBtn" class="search-fields-btn" type="button">筛选</button>
                  <input id="allAccountsSearch" type="text" placeholder="搜索当前列表（用户名 / 站点别名 / 备注 / 密码）" />
                  <button id="openSortModal" type="button">排序</button>
                  <button id="openHistoryModal" type="button">历史记录</button>
                  <div id="allAccountsSearchFieldsPanel" class="search-fields-panel hidden">
                    <label><input id="allAccountsSearchFieldAll" type="checkbox" checked />全部</label>
                    <label><input id="allAccountsSearchFieldUsername" type="checkbox" />用户名</label>
                    <label><input id="allAccountsSearchFieldSites" type="checkbox" />站点别名</label>
                    <label><input id="allAccountsSearchFieldNote" type="checkbox" />备注</label>
                    <label><input id="allAccountsSearchFieldPassword" type="checkbox" />密码</label>
                  </div>
                </div>
                <button id="clearActiveAccounts" class="button-danger">全部移入回收站</button>
                <button id="clearRecycleBin" class="button-danger">清空回收站</button>
              </div>
            </div>
            <div id="allAccountsList" class="all-account-list"></div>
          </div>
        </div>
      </section>

      <section class="card">
        <details id="rawDataDetails">
          <summary>账号数据</summary>
          <textarea id="payload" spellcheck="false"></textarea>
          <div class="actions">
            <button id="exportSyncBundleBtn">导出同步包</button>
            <button id="importSyncBundleBtn">导入并合并同步包</button>
            <button id="refreshBtn">刷新</button>
            <button id="exportBtn">导出 JSON</button>
            <button id="importBtn">导入 JSON</button>
            <button id="clearBtn">清空账号</button>
          </div>
          <p id="status" class="status"></p>
        </details>
      </section>
    </main>
    <div id="sortModal" class="sort-modal-backdrop hidden" aria-hidden="true">
      <section class="sort-modal-card" role="dialog" aria-modal="true" aria-label="排序账号">
        <h3>排序</h3>
        <div id="sortModalList" class="sort-modal-list"></div>
        <div class="actions">
          <button id="closeSortModal" type="button">关闭</button>
        </div>
      </section>
    </div>
    <div id="historyModal" class="sort-modal-backdrop hidden" aria-hidden="true">
      <section class="sort-modal-card history-modal-card" role="dialog" aria-modal="true" aria-label="历史记录">
        <h3>历史记录</h3>
        <div id="historyModalList" class="history-modal-list"></div>
        <div class="actions">
          <button id="closeHistoryModal" type="button">关闭</button>
        </div>
      </section>
    </div>
    <div id="addSitesToFolderModal" class="sort-modal-backdrop hidden" aria-hidden="true">
      <section class="sort-modal-card add-sites-modal-card" role="dialog" aria-modal="true" aria-label="指定网站全部账号">
        <h3>指定网站全部账号</h3>
        <p class="sort-modal-hint">每行输入一个站点，会把全部账号中包含该站点的账号全部加入当前文件夹。</p>
        <textarea id="addSitesToFolderInput" class="add-sites-modal-input" spellcheck="false"></textarea>
        <label class="inline-check">
          <input id="addSitesToFolderAutoAdd" type="checkbox" checked />
          <span>后续自动加入</span>
        </label>
        <div class="actions">
          <button id="cancelAddSitesToFolder" type="button">取消</button>
          <button id="confirmAddSitesToFolder" type="button">加入文件夹</button>
        </div>
      </section>
    </div>
    <script src="./dist/options.js"></script>
  </body>
  </html>
